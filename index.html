<!--index.html file-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Portfolio</title>
        <!-- Links CSS file to HTML -->
        <link rel="stylesheet" href="./style.css">
        <!-- Links JS file to HTML-->
        <!-- defer is optional but allows HTML to load fully before script executes-->
        <script src="./script.js" defer></script>
    </head>
    <body>
        <h2>This is Nathan's Portfolio Web App</h2>
        <h1 style="text-align: center;">This is the Home Page</h1>
        <!-- Adds navigation link identifiers-->
        <!-- we use class since the navigation bar consists of all of the links and id since each page is unique-->
         <div class="nav-bar">
            <a id="Home" href=".html">Home</a>
            <a id="AboutMe" href="about_me.html">About Me</a>
            <a id="Portfolio" href="portfolio.html">Portfolio</a>
            <a id="Contact" href="contact.html">Contact</a>
         </div>
         <!-- Add buttons to view resume and download resume as a pdf-->
          <!-- we use the class name of button and store them in a div to position them together -->
          <div class="button">
            <!-- we used ids since each button is unique-->
            <button id="button1">View Resume</button>
            <button id="button2">Download Resume as PDF</button>
          </div>
    </body>
</html>
