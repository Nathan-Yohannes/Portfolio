<!--index.html file-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Portfolio</title>
    <!-- Links CSS file to HTML -->
    <link rel="stylesheet" href="./style.css">
    <!-- Link to icon library Font Aweome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Links JS file to HTML-->
    <!-- defer is optional but allows HTML to load fully before script executes-->
    <script src="./script.js" defer></script>
</head>

<body>
    <h1 class="page-header">Nathan Yohannes</h1>
    <h2 class="page-header">Hi, I'm Nathan, a Software Engineer with a focus on Web Development.</h2>
    <!-- Adds navigation link identifiers-->
    <!-- we use class since the navigation bar consists of all of the links -->
    <header>
        <nav class="nav-bar">
            <a href="./index.html">Home</a>
            <a href="./about_me.html">About Me</a>
            <a href="./portfolio.html">Portfolio</a>
            <a href="./contact.html">Contact</a>
        </nav>
    </header>
    <!-- Add buttons to view resume and download resume as a pdf-->
    <!-- we use the class name of button and store them in a div to position them together -->
    <div class="button">
        <a href="https://docs.google.com/document/d/1lMSZrZ5LgjavQHns6UzecJQHusT0yHx1-Xaf35hu4P8/edit?tab=t.0">
            <button>View Resume</button>
        </a>
        <a href="./resume/Resume.pdf" download>
            <button>Download Resume as PDF</button>
        </a>
    </div>
    <!-- Add profile picture present on the home page-->
     <div class="center-image">
         <img src="/images/profile_picture.jpeg" width="300" height="300">
     </div>
     <div class="icons">
          <!-- Add GitHub Icon -->
           <a href="https://github.com/Nathan-Yohannes">
            <i class="fa-brands fa-github"></i>
           </a>
          <!-- Add LinkedIn Icon -->
           <a href="https://www.linkedin.com/in/nathan-yohannes-a2546a35b/">
            <i class="fa-brands fa-square-linkedin"></i>
           </a>
      </div>
</body>
</html>
